# Monitoring Inventory
history_days: 90

groups:
  - name: "Production Services"
    endpoints:
      - name: "Primary API"
        url: "https://ind-prod.sarasfinance.com/health"
        critical: true
      - name: "Web Portal"
        url: "https://sarasfinance.com"
        critical: false

  - name: "Development Services"
    endpoints:
      - name: "Primary API"
        url: "https://ind-dev.sarasfinance.com/health"
        critical: true

