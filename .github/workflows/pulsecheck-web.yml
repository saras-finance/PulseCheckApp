name: PulseCheck Web Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  push:
    branches:
      - main              # Run on pushes to main
  workflow_dispatch:      # Manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r webApp/requirements.txt

    - name: Run Health Checks
      working-directory: webApp
      env:
        # Pushover
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        # SendGrid (Professional Email)
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        # Webhook / API Call Alert
        ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        ALERT_WEBHOOK_BEARER_TOKEN: ${{ secrets.ALERT_WEBHOOK_BEARER_TOKEN }}
      run: python monitor.py

    - name: Commit and Push Status Page
      run: |
        git config --global user.name "Chandra Prakash"
        git config --global user.email "cprakashagr@gmail.com"
        # Remove legacy file if it exists
        git rm --ignore-unmatch webApp/index.html
        # Add root index, rss, and history
        git add index.html rss.xml webApp/history.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update status, rss and history [skip ci]" && git push)

